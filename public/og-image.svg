<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050a18"/>
      <stop offset="100%" style="stop-color:#0c1222"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4aa"/>
      <stop offset="100%" style="stop-color:#00f0c0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="white"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <!-- Hexagon logo -->
  <g transform="translate(540, 200)">
    <polygon points="60,0 120,35 120,105 60,140 0,105 0,35" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.8"/>
    <!-- Molecule nodes -->
    <circle cx="60" cy="50" r="6" fill="#00d4aa"/>
    <circle cx="90" cy="70" r="4" fill="#00d4aa" opacity="0.7"/>
    <circle cx="40" cy="85" r="4" fill="#00d4aa" opacity="0.7"/>
    <circle cx="75" cy="100" r="3" fill="#00d4aa" opacity="0.5"/>
    <line x1="60" y1="50" x2="90" y2="70" stroke="#00d4aa" stroke-width="1.5" opacity="0.5"/>
    <line x1="60" y1="50" x2="40" y2="85" stroke="#00d4aa" stroke-width="1.5" opacity="0.5"/>
    <line x1="90" y1="70" x2="75" y2="100" stroke="#00d4aa" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="600" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="#e2e8f0">
    OpenDDE
  </text>

  <!-- Subtitle -->
  <text x="600" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#8892a4">
    Open Drug Design Engine
  </text>

  <!-- Tagline -->
  <text x="600" y="510" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#5a6478">
    Pocket discovery · Ligand intelligence · Complex prediction · Antibody modeling
  </text>

  <!-- Accent line -->
  <rect x="500" y="470" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>
</svg>
